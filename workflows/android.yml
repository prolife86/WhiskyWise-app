name: Android

# Mirrors the versioning pattern of the WhiskyWise Docker workflow:
#   - Version source of truth is the git tag (e.g. v1.2.3)
#   - Publishing a GitHub Release triggers the full pipeline
#   - Push to main triggers a debug build / lint check only
#   - Pull requests trigger a build check only (no signing, no release)
#
# Job order:
#   extract-version → build → sign-and-publish (release only)
#
# Secrets required (Settings → Secrets → Actions):
#   KEYSTORE_BASE64    — base64-encoded .jks keystore file
#                        generate:  keytool -genkey -v -keystore whiskywise.jks \
#                                     -alias whiskywise -keyalg RSA -keysize 2048 \
#                                     -validity 10000
#                        encode:    base64 -i whiskywise.jks | pbcopy   (macOS)
#                                   base64 whiskywise.jks               (Linux)
#   KEYSTORE_PASSWORD  — the store password you chose above
#   KEY_ALIAS          — the alias you chose above (e.g. whiskywise)
#   KEY_PASSWORD       — the key password (often same as store password)

on:
  release:
    types: [ published ]

  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  # ── 1. Determine version from git tag (same logic as Docker workflow) ──────
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.set.outputs.version }}
      version_code: ${{ steps.set.outputs.version_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: set
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"          # strip leading 'v'
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            VERSION="${VERSION#v}"
          fi

          # Convert semver → integer versionCode (e.g. 1.2.3 → 10203)
          # Supports up to 99 minor/patch versions per segment.
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Detected version : $VERSION"
          echo "versionCode      : $VERSION_CODE"

  # ── 2. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    needs: [ extract-version ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write version into build.gradle
        # Injects the tag-derived version so the APK filename and
        # About screen always match the GitHub Release.
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ needs.extract-version.outputs.version_code }}/" app/build.gradle
          sed -i "s/versionName \"1.0.0\"/versionName \"${{ needs.extract-version.outputs.version }}\"/" app/build.gradle
          echo "--- app/build.gradle after patch ---"
          grep -E "versionCode|versionName" app/build.gradle

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release AAB (unsigned)
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK (always available as artifact)
        uses: actions/upload-artifact@v4
        with:
          name: whiskywise-debug-${{ needs.extract-version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whiskywise-release-unsigned-${{ needs.extract-version.outputs.version }}
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── 3. Sign & publish (release events only) ───────────────────────────────
  sign-and-publish:
    name: Sign & publish to GitHub Release
    runs-on: ubuntu-latest
    needs: [ extract-version, build ]
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download unsigned release artifacts
        uses: actions/download-artifact@v4
        with:
          name: whiskywise-release-unsigned-${{ needs.extract-version.outputs.version }}
          path: release/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > whiskywise.jks

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner sign \
            --ks whiskywise.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk \
            release/app-release-unsigned.apk

      - name: Rename AAB
        run: |
          mv release/app-release.aab \
             release/whiskywise-v${{ needs.extract-version.outputs.version }}.aab

      - name: Verify APK signature
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner verify \
            --verbose \
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk

      - name: Attach APK & AAB to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.extract-version.outputs.version }}"
          files: |
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.aab
          append_body: true
          body: |

            ---
            ### Android app  —  v${{ needs.extract-version.outputs.version }}
            | File | Use for |
            |---|---|
            | `whiskywise-v${{ needs.extract-version.outputs.version }}.apk` | Direct install (sideload) |
            | `whiskywise-v${{ needs.extract-version.outputs.version }}.aab` | Google Play Store upload |

            **Sideload instructions**
            1. Download the `.apk` above to your Android device.
            2. Enable *Install from unknown sources* in Settings → Security.
            3. Open the downloaded file and tap Install.

            > The AAB is the format required for new Play Store submissions.
            > Upload it via the [Google Play Console](https://play.google.com/console).
