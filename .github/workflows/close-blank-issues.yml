name: Close issues not using a template

on:
  issues:
    types: [ opened ]

permissions:
  issues: write

jobs:
  close_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue uses a template
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";
            const headingRegex = /^(#{1,6})\s.+/gm;
            const headings = [...body.matchAll(headingRegex)];

            if (headings.length < 3) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "Thanks for opening an issue! Please use one of the provided issue templates so we can review it efficiently. For general questions, consider opening a Discussion instead."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: "closed"
              });
            }
