name: Android

# Version source of truth is the git tag (e.g. v0.0.1)
# Publishing a GitHub Release triggers the full pipeline.
# Push to main or a PR triggers a debug build / lint check only.
#
# Secrets required (Settings → Secrets → Actions):
#   KEYSTORE_BASE64   — base64-encoded .jks keystore file
#   KEYSTORE_PASSWORD — the store password
#   KEY_ALIAS         — the key alias (e.g. whiskywise)
#   KEY_PASSWORD      — the key password

on:
  release:
    types: [ published ]

  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build'

jobs:
  # ── 1. Extract version from git tag ───────────────────────────────────────
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.set.outputs.version }}
      version_code: ${{ steps.set.outputs.version_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: set
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.1")
            VERSION="${VERSION#v}"
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
name: Android

# Version source of truth is the git tag (e.g. v0.0.1)
# Publishing a GitHub Release triggers the full pipeline.
# Push to main or a PR triggers a debug build / lint check only.
#
# Secrets required (Settings → Secrets → Actions):
#   KEYSTORE_BASE64   — base64-encoded .jks keystore file
#   KEYSTORE_PASSWORD — the store password
#   KEY_ALIAS         — the key alias (e.g. whiskywise)
#   KEY_PASSWORD      — the key password

on:
  release:
    types: [ published ]

  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build'

jobs:
  # ── 1. Extract version from git tag ───────────────────────────────────────
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.set.outputs.version }}
      version_code: ${{ steps.set.outputs.version_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: set
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.1")
            VERSION="${VERSION#v}"
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Detected version : $VERSION"
          echo "versionCode      : $VERSION_CODE"

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    needs: [ extract-version ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Patch versionCode and versionName
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ needs.extract-version.outputs.version_code }}/" app/build.gradle
          sed -i 's/versionName "[0-9]*\.[0-9]*\.[0-9]*"/versionName "${{ needs.extract-version.outputs.version }}"/' app/build.gradle
          echo "--- patched values ---"
          grep -E "versionCode|versionName" app/build.gradle

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release AAB (unsigned)
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: whiskywise-debug-${{ needs.extract-version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: whiskywise-release-unsigned-${{ needs.extract-version.outputs.version }}
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── 3. Sign & publish (release events only) ───────────────────────────────
  sign-and-publish:
    name: Sign & publish to GitHub Release
    runs-on: ubuntu-latest
    needs: [ extract-version, build ]
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download unsigned release artifacts
        uses: actions/download-artifact@v7
        with:
          name: whiskywise-release-unsigned-${{ needs.extract-version.outputs.version }}
          path: release/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > whiskywise.jks

      - name: Set up build tools path
        id: buildtools
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "path=$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS" >> "$GITHUB_OUTPUT"

      - name: Sign APK
        run: |
          ${{ steps.buildtools.outputs.path }}/apksigner sign \
            --ks whiskywise.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk \
            release/app-release-unsigned.apk

      - name: Rename AAB
        run: |
          mv release/app-release.aab \
             release/whiskywise-v${{ needs.extract-version.outputs.version }}.aab

      - name: Verify APK signature
        run: |
          ${{ steps.buildtools.outputs.path }}/apksigner verify \
            --verbose \
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk

      - name: Attach APK & AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.aab
skywise-v${{ needs.extract-version.outputs.version }}.aab

      - name: Verify APK signature
        run: |
          ${{ steps.buildtools.outputs.path }}/apksigner verify \
            --verbose \
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk

      - name: Attach APK & AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.apk
            release/whiskywise-v${{ needs.extract-version.outputs.version }}.aab
