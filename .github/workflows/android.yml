Claude responded: Based on what I just read from the Android developer docs, here's an honest assessment:

Based on what I just read from the Android developer docs, here's an honest assessment:
AGP 9.x advantages

    Cleaner, more stable public API — the DSL was fully modernised; the old internal BaseExtension types are gone and replaced with proper public interfaces. Better long-term stability for build scripts.
    API level 36/37 support — required if you ever want to target the very latest Android releases.
    R8 improvements — better shrinking and obfuscation, including automatic class repackaging and improved Kotlin null-check handling.
    Configuration cache as default — faster build times, especially noticeable in larger projects.

The case for staying on 8.13 right now

    AGP 9.0 removes the old deprecated variant API and uses new DSL interfaces exclusively — meaning any third-party plugin that hasn't caught up yet will simply break. For a pre-production app at 0.0.1 you don't want surprise breakages from libraries you don't control.
    Android Developers
    Google themselves note you can opt out and get back the old implementations temporarily, but that opt-out will be removed in AGP 10.0 mid-2026.
    Android Developers
    Kotlin 2.3.0 supports AGP up to 8.13.0 as the maximum tested version — so 8.13 + Kotlin 2.3.21 is the fully validated combination right now.
    Kotlin

Verdict

For a 0.0.1 pre-production app, 8.13 is the better choice. You get Kotlin 2.x, the latest AndroidX libraries, and API 35 support — without the risk of a third-party plugin (Glide, MLKit, etc.) not yet being AGP 9 compatible. AGP 9 is worth revisiting around 1.0.0 when those ecosystems have fully caught up.

