name: Close fixed issues on release

on:
  release:
    types: [ published ]

permissions:
  contents: read
  issues: write

jobs:
  close-fixed-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues labelled "awaiting release"
        uses: actions/github-script@v8
        with:
          script: |
            const label = 'awaiting release';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 100,
            });
            const releaseTag = context.payload.release.tag_name;
            const releaseUrl = context.payload.release.html_url;
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: issue.number,
                body: `Fixed in [${releaseTag}](${releaseUrl}).`,
              });
              await github.rest.issues.removeLabel({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: issue.number,
                name: label,
              });
              await github.rest.issues.update({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
            core.info(`Closed ${issues.length} issue(s) labelled "${label}".`);
