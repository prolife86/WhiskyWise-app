name: Generate Keystore (run once)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (e.g. whiskywise)'
        required: true
        default: 'whiskywise'
      keystore_password:
        description: 'Keystore password (min 6 chars, letters and numbers only)'
        required: true
      key_password:
        description: 'Key password (min 6 chars, letters and numbers only)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate JKS keystore
        run: |
          keytool -genkeypair -v \
            -keystore whiskywise.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -storetype JKS \
            -dname "CN=WhiskyWise, OU=Android, O=WhiskyWise, L=Unknown, S=Unknown, C=NL"

      - name: Verify JKS contains PrivateKeyEntry
        run: |
          keytool -list -v \
            -keystore whiskywise.jks \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -storetype JKS \
            | grep -E "Entry type|Alias name"

      - name: Base64 encode (no line breaks)
        run: base64 -w 0 whiskywise.jks > whiskywise_b64.txt

      - name: Print encoded keystore
        run: |
          echo "============================================"
          echo "Copy everything between the dashes below"
          echo "and paste it as the KEYSTORE_BASE64 secret."
          echo "--------------------------------------------"
          cat whiskywise_b64.txt
          echo ""
          echo "--------------------------------------------"

      - name: Upload keystore as artifact (keep as backup)
        uses: actions/upload-artifact@v6
        with:
          name: whiskywise-keystore-BACKUP
          path: whiskywise.jks
          retention-days: 1
