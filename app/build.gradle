plugins {
    id 'com.android.application'
}

android {
    namespace 'com.whiskywise.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.whiskywise.app"
        minSdk 26
        targetSdk 35
        // ⚠️ versionCode and versionName are patched automatically by the
        // GitHub Actions workflow (android.yml) using the git release tag.
        // Do NOT edit these by hand — create a GitHub Release instead.
        versionCode 1
        versionName "0.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        viewBinding true
        buildConfig true    // exposes BuildConfig.VERSION_NAME / VERSION_CODE
    }

    packaging {
        jniLibs {
            // MLKit barcode native libs cannot be stripped — package as-is
            keepDebugSymbols += [
                "*/arm64-v8a/libbarhopper_v3.so",
                "*/armeabi-v7a/libbarhopper_v3.so",
                "*/x86/libbarhopper_v3.so",
                "*/x86_64/libbarhopper_v3.so",
                "*/arm64-v8a/libimage_processing_util_jni.so",
                "*/armeabi-v7a/libimage_processing_util_jni.so",
                "*/x86/libimage_processing_util_jni.so",
                "*/x86_64/libimage_processing_util_jni.so",
            ]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlin {
        jvmToolchain(17)
    }
}

dependencies {
    // AndroidX Core
    implementation 'androidx.core:core-ktx:1.16.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    // Navigation
    implementation 'androidx.navigation:navigation-fragment-ktx:2.9.0'
    implementation 'androidx.navigation:navigation-ui-ktx:2.9.0'

    // Lifecycle / ViewModel
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.9.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.9.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.0'

    // Networking — Retrofit + OkHttp + Gson
    implementation 'com.squareup.retrofit2:retrofit:2.11.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.11.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'

    // Image loading
    implementation 'com.github.bumptech.glide:glide:4.16.0'

    // Secure preferences (EncryptedSharedPreferences)
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // Barcode scanning
    implementation 'com.google.mlkit:barcode-scanning:17.3.0'
    implementation 'androidx.camera:camera-core:1.4.2'
    implementation 'androidx.camera:camera-camera2:1.4.2'
    implementation 'androidx.camera:camera-lifecycle:1.4.2'
    implementation 'androidx.camera:camera-view:1.4.2'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
